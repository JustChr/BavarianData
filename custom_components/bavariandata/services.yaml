fetch_telematic_data:
  name: Fetch Telematic Data
  description: Fetch telematic data for a VIN using the stored container and log the response.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN to query. Defaults to the first VIN seen on the stream.
      example: WBY31AW090FP15359
fetch_vehicle_mappings:
  name: Fetch Vehicle Mappings
  description: Fetch mapping information for the configured account and log the response.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
fetch_basic_data:
  name: Fetch Basic Vehicle Data
  description: Fetch static vehicle metadata (model name, series, etc.) for a VIN and log the response.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN to query. Defaults to the VIN stored in the config entry.
      example: WBY31AW090FP15359
fetch_charging_history:
  name: Fetch Charging History
  description: >-
    Fetch the charging session history for a VIN (paginated) and log the
    response. Counts as one or more API calls against the 50/24h quota.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN to query. Defaults to the first known VIN.
      example: WBY31AW090FP15359
    from:
      description: Optional ISO 8601 start date/time to filter sessions.
      example: "2025-01-01T00:00:00Z"
    to:
      description: Optional ISO 8601 end date/time to filter sessions.
      example: "2025-02-01T00:00:00Z"
fetch_tyre_diagnosis:
  name: Fetch Smart Maintenance Tyre Diagnosis
  description: Fetch the smart-maintenance tyre diagnosis for a VIN and log the response.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN to query. Defaults to the first known VIN.
      example: WBY31AW090FP15359
fetch_location_charging_settings:
  name: Fetch Location-Based Charging Settings
  description: Fetch the location-based charging settings for a VIN (paginated) and log the response.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN to query. Defaults to the first known VIN.
      example: WBY31AW090FP15359
fetch_vehicle_image:
  name: Fetch Vehicle Image
  description: Fetch the vehicle image for a VIN and log its size/content type.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN to query. Defaults to the first known VIN.
      example: WBY31AW090FP15359
get_charging_sessions:
  name: Get Charging Sessions
  description: >-
    Return recorded charging sessions, newest first. Reads the integration's own
    history, so unlike the fetch_* services it costs no BMW API quota.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN to filter by. Defaults to every known vehicle.
      example: WBY31AW090FP15359
    from:
      description: Only sessions that started on or after this date/time.
      example: "2026-07-01"
    to:
      description: Only sessions that started on or before this date/time.
      example: "2026-07-31"
    limit:
      description: Maximum number of sessions to return.
      example: 20
get_trips:
  name: Get Trips
  description: >-
    Return recorded trips, newest first. Reads the integration's own history, so
    like get_charging_sessions it costs no BMW API quota. Endpoints are stored as
    place names, never coordinates.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN to filter by. Defaults to every known vehicle.
      example: WBY31AW090FP15359
    from:
      description: Only trips that started on or after this date/time.
      example: "2026-07-01"
    to:
      description: Only trips that started on or before this date/time.
      example: "2026-07-31"
    limit:
      description: Maximum number of trips to return.
      example: 50
get_driving_summary:
  name: Get Driving Summary
  description: >-
    Return the "month in review" aggregation for trips - distance, the
    business/private/commute split, consumption, recuperation, driving-style
    score, top destinations and (with a tariff) an estimated driving cost. Reads
    the local store, so it costs no BMW API quota.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN. Defaults to the single configured vehicle.
      example: WBY31AW090FP15359
    month:
      description: Month to summarise as YYYY-MM. Defaults to the current month.
      example: "2026-07"
set_trip_class:
  name: Set Trip Classification
  description: >-
    Override a trip's classification (business, private or commute). Use this to
    correct the automatic zone-pair guess. Writes the local store only.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN. Defaults to the single configured vehicle.
      example: WBY31AW090FP15359
    trip_id:
      description: The trip's id, as returned by get_trips.
      example: WBY31AW090FP15359-2026-07-06T08:00:00+00:00
    classification:
      description: One of business, private or commute.
      example: business
      selector:
        select:
          options:
            - business
            - private
            - commute
export_history:
  name: Export History
  description: >-
    Return one month of recorded charging sessions and/or trips as files - CSV
    for spreadsheets, or a self-contained HTML report you can print to PDF from
    the browser. The file contents come back in the response; nothing is written
    to disk. Reads the local store, so it costs no BMW API quota.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN. Defaults to the single configured vehicle.
      example: WBY31AW090FP15359
    month:
      description: Month to export as YYYY-MM. Defaults to the current month.
      example: "2026-07"
    type:
      description: Which records to include.
      default: both
      example: both
      selector:
        select:
          options:
            - charging
            - trips
            - both
    format:
      description: >-
        csv returns one file per record type; html returns a single printable
        month report.
      default: csv
      example: csv
      selector:
        select:
          options:
            - csv
            - html
    language:
      description: >-
        Report language (en or de). Defaults to Home Assistant's own language.
        Only affects the HTML report - CSV headers are always machine-readable
        English.
      example: de
import_statistics:
  name: Import Into Long-Term Statistics
  description: >-
    Rebuild this integration's long-term statistics from the recorded history,
    so charging and driving from before the install (or from while Home
    Assistant was down) appear on the Energy dashboard. This runs automatically
    as records are made; use it after restoring a backup or to verify the row
    counts. Local only - no BMW API quota.
  fields:
    entry_id:
      description: Optional config entry id to target. Required if multiple entries are configured.
      example: 01K65NKFESKBQZ78PBW6V9BCCX
    vin:
      description: Optional VIN to rebuild. Defaults to every known vehicle.
      example: WBY31AW090FP15359
